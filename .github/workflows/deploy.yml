name: Deploy to Vercel
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'config.example.json'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1" # อัปเดตเป็นเวอร์ชันที่ใหม่กว่าเพื่อให้รองรับ Dart SDK 3.12.1+
          channel: "stable"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Optimize Pubspec and Assets for Web
        run: |
          # Remove the map_tiles.bundle line from pubspec.yaml to avoid inclusion in build
          sed -i '/- assets\/map_tiles.bundle/d' pubspec.yaml
          # Delete the file itself to be safe and save space in runner
          rm -f assets/map_tiles.bundle

      - name: Verify Code Quality (Analyze)
        run: flutter analyze || { echo '::error::Code analysis failed. Please fix the linting errors before deploying.'; exit 1; }

      - name: Verify Logic (Test)
        run: flutter test --exclude-tags live_api || { echo '::error::Unit/Widget tests failed. Please fix the failing tests before deploying.'; exit 1; }

      - name: Build Web
        run: |
          flutter build web --release --tree-shake-icons \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=OSRM_BASE_URL=${{ secrets.OSRM_BASE_URL }} \
            --dart-define=OVERPASS_BASE_URL=${{ secrets.OVERPASS_BASE_URL }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Prepare Clean Vercel Folder
        run: |
          mkdir -p dist_vercel/build/web
          mkdir -p dist_vercel/api
          cp -r build/web/* dist_vercel/build/web/
          cp -r api/* dist_vercel/api/
          cp vercel.json dist_vercel/vercel.json
          mkdir -p dist_vercel/.vercel
          echo '{"projectId":"${{ secrets.VERCEL_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}","projectName":"bangkok-transit-planner"}' > dist_vercel/.vercel/project.json

      - name: Deploy to Vercel
        run: |
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: dist_vercel
