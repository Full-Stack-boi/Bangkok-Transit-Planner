name: Deploy to Vercel
on:
  push:
    branches:
      - main
      - master  # เพิ่ม master เผื่อไว้ครับ
  workflow_dispatch: # เพิ่มเพื่อให้กดรันเอง (Manual) ได้ครับ

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install requests Pillow

      - name: Cache Map Bundle
        id: cache-map-bundle
        uses: actions/cache@v4
        with:
          path: assets/map_tiles.bundle
          key: ${{ runner.os }}-map-bundle-${{ hashFiles('bin/generate_bundle.py', 'assets/data/stations.json') }}
          # นำ restore-keys ออกชั่วคราวเพื่อความชัวร์ หรือปรับให้ตรงกันครับ

      - name: Generate Map Bundle
        if: steps.cache-map-bundle.outputs.cache-hit != 'true'
        run: python bin/generate_bundle.py

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1' # อัปเดตเป็นเวอร์ชันที่ใหม่กว่าเพื่อให้รองรับ Dart SDK 3.12.1+
          channel: 'stable'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Optimize Pubspec and Assets for Web
        run: |
          # Remove the map_tiles.bundle line from pubspec.yaml to avoid inclusion in build
          sed -i '/- assets\/map_tiles.bundle/d' pubspec.yaml
          # Delete the file itself to be safe and save space in runner
          rm -f assets/map_tiles.bundle

      - name: Build Web
        run: flutter build web --release --tree-shake-icons --dart-define=FLUTTER_WEB_RENDERER=html

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Prepare Vercel Output
        run: |
          mkdir -p .vercel/output/static
          cp -r build/web/* .vercel/output/static/
          echo '{"version":3}' > .vercel/output/config.json

      - name: Deploy to Vercel
        run: |
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: .
