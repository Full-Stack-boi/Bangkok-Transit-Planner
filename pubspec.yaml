name: bkk_transit_planner
description: "Bangkok Transit Planner — วางแผนการเดินทาง BTS MRT ARL"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management (MVVM glue)
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Backend + Auth
  supabase_flutter: ^2.9.0



  # Map
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # Location (GPS passive crowd)
  geolocator: ^14.0.3
  permission_handler: ^12.0.3

  # Google Auth
  google_sign_in: ^7.2.0

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  path_provider: ^2.1.2
  http: ^1.2.0
  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  flutter_local_notifications: ^22.0.0
  live_activities: ^2.4.9
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  freezed: ^3.2.3
  json_serializable: ^6.9.5
  build_runner: ^2.4.15
  riverpod_generator: ^4.0.0+1
  custom_lint:
  riverpod_lint: ^3.1.0
flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/map_tiles.bundle
