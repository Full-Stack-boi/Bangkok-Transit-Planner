name: bkk_transit_planner
description: "Bangkok Transit Planner — วางแผนการเดินทาง BTS MRT ARL"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management (MVVM glue)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Backend + Auth
  supabase_flutter: ^2.9.0

  # Navigation
  go_router: ^14.8.1

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location (GPS passive crowd)
  geolocator: ^13.0.2
  permission_handler: ^11.4.0

  # Google Auth
  google_sign_in: ^6.2.2

  # Utilities
  collection: ^1.19.1
  intl: ^0.20.2
  shared_preferences: ^2.5.3

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  freezed: 3.1.0
  json_serializable: ^6.9.5
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  custom_lint:
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
